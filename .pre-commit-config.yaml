repos:
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v6.0.0
  hooks:
  - id: check-merge-conflict
  - id: debug-statements
    language_version: python3.10
    exclude: python/genvarloader/_dataset/_impl\.py
  - id: mixed-line-ending
  - id: check-case-conflict
  - id: check-yaml
- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: v0.15.20
  hooks:
  - id: ruff-check
  - id: ruff-format
- repo: local
  hooks:
  - id: pyrefly-check
    name: Pyrefly (type checking)
    # Invoke through pixi so the dev env (and its site-packages: attrs,
    # pydantic, seqpro, …) is active. A bare `pyrefly` on system PATH
    # (e.g. from `pixi global install pyrefly`) would otherwise be picked
    # up by `git push` outside of a `pixi run` context and resolve the
    # wrong Python interpreter.
    entry: pixi run -e dev pyrefly check
    language: system
    pass_filenames: false
  - id: pixi-lock
    name: pixi lock
    language: system
    entry: pixi lock
    pass_filenames: false
    always_run: true
    stages: [pre-push]
- repo: https://github.com/commitizen-tools/commitizen
  rev: v4.16.4
  hooks:
  - id: commitizen
    stages: [commit-msg]
  - id: commitizen-branch
    stages: [pre-push]
    args: [--rev-range=origin/main..]

ci:
  autofix_commit_msg: |
        chore(pre-commit): auto fixes from pre-commit.com hooks

        for more information, see https://pre-commit.ci
  autoupdate_commit_msg: 'chore(pre-commit.ci): pre-commit autoupdate'
  # pre-commit.ci has no pixi; these hooks invoke `pixi run …`. The
  # project's own `Lint` workflow runs them in CI (see .github/workflows/lint.yaml).
  skip: [pyrefly-check, pixi-lock]