name: Test

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - stable
  workflow_dispatch:

jobs:
  pytest:
    runs-on: ubuntu-latest
    name: "pytest on Python ${{ matrix.environment }}"
    strategy:
      fail-fast: false
      matrix:
        environment: [py310, py311, py312, py313]
    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup pixi
        uses: prefix-dev/setup-pixi@v0.9.5
        with:
          pixi-version: v0.68.1
          cache: true
          environments: ${{ matrix.environment }}
          locked: false
      - name: Cache hg38 reference
        uses: actions/cache@v4
        with:
          path: tests/data/fasta
          # Minimal hg38 (chr21 + chr22) concatenated + bgzipped by
          # tests/data/generate_1kg_ground_truth.py::provision_minimal_hg38.
          # Keyed on the pinned UCSC chr21/chr22 sha256s; bump if those change.
          key: hg38-chr21chr22-c979ca1e-05f9d97d
      - name: Test
        run: pixi run -e ${{ matrix.environment }} test

  coverage:
    runs-on: ubuntu-latest
    name: "coverage (py312)"
    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup pixi
        uses: prefix-dev/setup-pixi@v0.9.5
        with:
          pixi-version: v0.68.1
          cache: true
          environments: py312
          locked: false
      - name: Cache hg38 reference
        uses: actions/cache@v4
        with:
          path: tests/data/fasta
          # Minimal hg38 (chr21 + chr22) concatenated + bgzipped by
          # tests/data/generate_1kg_ground_truth.py::provision_minimal_hg38.
          # Keyed on the pinned UCSC chr21/chr22 sha256s; bump if those change.
          key: hg38-chr21chr22-c979ca1e-05f9d97d
      - name: Run pytest with coverage
        run: pixi run -e py312 test-cov
      - name: Upload HTML coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: htmlcov
          path: htmlcov/
          if-no-files-found: error
      - name: Upload coverage.xml
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: error

