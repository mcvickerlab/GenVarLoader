# hand-modified to support workflow_call from release-pipeline.yaml.
#
# To regenerate, run:
#
#   maturin generate-ci -o .github/workflows/publish.yaml github \
#     --platform linux musllinux manylinux windows macos
#
# Regenerating overwrites the trigger block and removes our edits. After
# regeneration, re-apply ALL of the following:
#
#   1. Replace the `on:` block with the workflow_call + workflow_dispatch block
#      below (inputs: dry_run, tag).
#   2. Remove the `on.workflow_run` block entirely.
#   3. Remove any per-job `if: ${{ github.event_name ... }}` guards added by
#      maturin (the orchestrator handles gating).
#   4. Add `with: ref: ${{ inputs.tag }}` to every `actions/checkout` step.
#   5. Re-add the free-threaded build steps (each platform's second
#      `PyO3/maturin-action` invocation with `-i python3.14t`).
#   6. Replace the final maturin `upload` step with the `uv publish` +
#      dry-run summary block.

name: Publish

on:
  workflow_call:
    inputs:
      dry_run:
        description: 'Build wheels but skip uv publish'
        type: boolean
        required: false
        default: false
      tag:
        description: 'Tag to check out and build wheels from (defaults to caller ref)'
        type: string
        required: false
        default: ''
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Build wheels but skip uv publish'
        type: boolean
        required: false
        default: false
      tag:
        description: 'Tag to check out and build wheels from (defaults to current ref)'
        type: string
        required: false
        default: ''

permissions:
  contents: read

jobs:
  linux:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - runner: ubuntu-22.04
            target: x86_64
            sccache: true
          - runner: ubuntu-22.04
            target: x86
            sccache: true
          - runner: ubuntu-22.04
            target: aarch64
            sccache: false
          - runner: ubuntu-22.04
            target: armv7
            sccache: false
          - runner: ubuntu-22.04
            target: s390x
            sccache: false
          - runner: ubuntu-22.04
            target: ppc64le
            sccache: false
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}
      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist
          sccache: ${{ inputs.tag == '' && matrix.platform.sccache }}
          manylinux: auto
        env:
          CFLAGS_aarch64_unknown_linux_gnu: -march=armv8-a -D__ARM_ARCH=8
          CFLAGS_armv7_unknown_linux_gnueabihf: -march=armv7-a -D__ARM_ARCH=7
      - name: Build free-threaded wheels
        # cp314t free-threaded cross-builds flake under QEMU emulation; don't let
        # a free-threaded build failure block the release of the stable wheels.
        continue-on-error: true
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist -i python3.14t
          sccache: ${{ inputs.tag == '' && matrix.platform.sccache }}
          manylinux: auto
        env:
          CFLAGS_aarch64_unknown_linux_gnu: -march=armv8-a -D__ARM_ARCH=8
          CFLAGS_armv7_unknown_linux_gnueabihf: -march=armv7-a -D__ARM_ARCH=7
      - name: Upload wheels
        uses: actions/upload-artifact@v6
        with:
          name: wheels-linux-${{ matrix.platform.target }}
          path: dist

  musllinux:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - runner: ubuntu-22.04
            target: x86_64
          - runner: ubuntu-22.04
            target: x86
          - runner: ubuntu-22.04
            target: aarch64
          - runner: ubuntu-22.04
            target: armv7
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}
      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist
          sccache: ${{ inputs.tag == '' }}
          manylinux: musllinux_1_2
      - name: Build free-threaded wheels
        # cp314t free-threaded cross-builds flake under QEMU emulation; don't let
        # a free-threaded build failure block the release of the stable wheels.
        continue-on-error: true
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist -i python3.14t
          sccache: ${{ inputs.tag == '' }}
          manylinux: musllinux_1_2
      - name: Upload wheels
        uses: actions/upload-artifact@v6
        with:
          name: wheels-musllinux-${{ matrix.platform.target }}
          path: dist

  windows:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - runner: windows-latest
            target: x64
            python_arch: x64
          - runner: windows-latest
            target: x86
            python_arch: x86
          - runner: windows-11-arm
            target: aarch64
            python_arch: arm64
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          architecture: ${{ matrix.platform.python_arch }}
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist
          sccache: ${{ inputs.tag == '' }}
      - uses: actions/setup-python@v6
        with:
          python-version: '3.14t'
          architecture: ${{ matrix.platform.python_arch }}
      - name: Build free-threaded wheels
        # cp314t free-threaded cross-builds flake under QEMU emulation; don't let
        # a free-threaded build failure block the release of the stable wheels.
        continue-on-error: true
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist -i python3.14t
          sccache: ${{ inputs.tag == '' }}
      - name: Upload wheels
        uses: actions/upload-artifact@v6
        with:
          name: wheels-windows-${{ matrix.platform.target }}
          path: dist

  macos:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - runner: macos-15-intel
            target: x86_64
          - runner: macos-latest
            target: aarch64
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}
      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist
          sccache: ${{ inputs.tag == '' }}
      - uses: actions/setup-python@v6
        with:
          python-version: '3.14t'
      - name: Build free-threaded wheels
        # cp314t free-threaded cross-builds flake under QEMU emulation; don't let
        # a free-threaded build failure block the release of the stable wheels.
        continue-on-error: true
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist -i python3.14t
          sccache: ${{ inputs.tag == '' }}
      - name: Upload wheels
        uses: actions/upload-artifact@v6
        with:
          name: wheels-macos-${{ matrix.platform.target }}
          path: dist

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - name: Upload sdist
        uses: actions/upload-artifact@v6
        with:
          name: wheels-sdist
          path: dist

  release:
    environment: pypi
    name: Release
    runs-on: ubuntu-latest
    needs: [linux, musllinux, windows, macos, sdist]
    permissions:
      id-token: write
      contents: write
      attestations: write
    steps:
      - uses: actions/download-artifact@v7
      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: 'wheels-*/*'
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Publish to PyPI
        if: inputs.dry_run == false
        run: uv publish 'wheels-*/*'
      - name: Dry-run summary (skipped uv publish)
        if: inputs.dry_run == true
        run: |
          {
            echo "## Dry-run: would have published the following wheels"
            echo
            ls -1 wheels-*/* | sed 's/^/- /'
          } >> "$GITHUB_STEP_SUMMARY"
