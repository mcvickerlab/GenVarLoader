[workspace]
name = "genvarloader"
channels = ["conda-forge", "bioconda"]
platforms = ["linux-64", "osx-arm64"]

[environments]
default = { features = ["default", "pytorch-cpu", "py310"] }
dev = { features = ["basenji2", "py310"] }
docs = { features = ["docs", "pytorch-cpu", "basenji2", "py312"] }
docs-gpu = { features = ["docs", "pytorch-gpu", "basenji2", "py312"] }
py310 = { features = ["pytorch-cpu", "py310"] }
py311 = { features = ["pytorch-cpu", "py311"] }
py312 = { features = ["pytorch-cpu", "py312"] }
py313 = { features = ["pytorch-cpu", "py313"] }
no-torch = { features = ["py310"], no-default-feature = true }
notebook = { features = ["notebook", "py310"] }
splice = { features = ["notebook", "basenji2", "py310", "splice"] }

[target.osx-arm64.activation.env]
RUSTFLAGS = "-C link-arg=-rpath -C link-arg=$CONDA_PREFIX/lib"

# Prepend the env's lib dir so its libstdc++/libpython win over any system libs
# an HPC module may have placed earlier on LD_LIBRARY_PATH (e.g. an older gcc
# libstdc++ lacking GLIBCXX_3.4.30, which breaks llvmlite in spawned workers and
# libpython loading in `cargo test` binaries).
[target.linux-64.activation.env]
LD_LIBRARY_PATH = "$CONDA_PREFIX/lib:$LD_LIBRARY_PATH"

[dependencies]
python = "<3.14"
uv = "*"
samtools = "*"
bcftools = "*"
ruff = "*"
prek = "*"
commitizen = "*"
maturin = ">=1.13.1,<2"
typing-extensions = ">=4.14"
typer = "*"
pytest-cases = "*"
pytest-cov = "*"
pytest-benchmark = "*"
pytest-codspeed = "*"
pytest = "*"
py-spy = "*"
icecream = "*"
hypothesis = "*"
filelock = "*"
memray = "*"
pyinstrument = "*"
patchelf = "*"
pyrefly = "*"

[target.linux-64.dependencies]
plink2 = "*"

[pypi-dependencies]
genvarloader = { path = ".", editable = true, extras = ["cli"] }
# Test-only: needed by the property/fixture tests across the whole py3xx matrix
# (not a genvarloader runtime dep, so it must live here, not just in py310).
vcfixture = ">=0.6.0,<0.7"

[feature.docs.dependencies]
pandoc = "*"

[feature.docs.pypi-dependencies]
sphinx = ">=7.4.7"
myst-parser = "*"
nbsphinx = "*"
ipykernel = "*"
ipywidgets = "*"
sphinx-book-theme = "*"
sphinx-autobuild = "*"
sphinx-autodoc-typehints = "*"
matplotlib = "*"
seaborn = "*"
scipy = "*"

[feature.pytorch-cpu.target.linux-64.dependencies]
pytorch-cpu = ">=2,<3"

[feature.pytorch-cpu.target.osx-arm64.pypi-dependencies]
torch = ">=2,<3"

[feature.pytorch-gpu.target.linux-64.pypi-dependencies]
torch = { version = ">=2,<3", index = "https://download.pytorch.org/whl/cu126" }

[feature.basenji2.target.linux-64.pypi-dependencies]
basenji2-pytorch = ">=0.1.2"

[feature.py310.dependencies]
python = "3.10.*"
numpy = "1.26.*"
# numba kept as a CONDA pin only because seqpro (a hard dep) eagerly imports
# numba, and only the conda build ships a working libllvmlite.so in this env —
# the PyPI numba/llvmlite wheel fails to load here. genvarloader's OWN code is
# numba-free (see tests/parity/test_import_no_numba.py); this pin is purely to
# keep seqpro's transitive numba working. Drop once seqpro stops importing numba.
numba = "==0.59.1"

[feature.py310.pypi-dependencies]
pyarrow = ">=21"
hirola = "==0.3"
seqpro = "==0.21.1"
# Dev-wiring (release-gated): genoray MAIN (unreleased INFO/FORMAT field-read API) as a
# pre-built abi3 wheel. Editable path-install would require genoray's rust-htslib C toolchain
# (cxx-compiler/clangdev/zlib/LIBCLANG_PATH) inside this env; we never edit genoray, so a
# frozen wheel is equivalent. Rebuild via, in the genoray checkout:
#   pixi run --manifest-path ci/wheel/pixi.toml build && ... repair   # -> dist/*.whl
# The wheel reports 2.15.0 (genoray's version was never bumped past the 3.0.0 tag), hence the
# dropped version constraint in pyproject.toml. Flip both to the PyPI release at merge.
genoray = { path = "/carter/users/dlaub/projects/genoray/dist/genoray-2.15.0-cp310-abi3-manylinux_2_28_x86_64.whl" }
polars = "==1.37.1"
loguru = "*"
natsort = "*"
cyvcf2 = "*"
pgenlib = "*"
pandera = "*"
pysam = "*"
pyranges = "*"
more-itertools = "*"
tqdm = "*"
pybigwig = "*"
einops = "*"
joblib = "*"
pooch = "*"
awkward = "*"
pydantic = ">=2,<3"
hypothesis = "*"
vcfixture = ">=0.6.0,<0.7"
filelock = "*"

[feature.py311.dependencies]
python = "3.11.*"

[feature.py312.dependencies]
python = "3.12.*"

[feature.py313.dependencies]
python = "3.13.*"

[tasks]
prek-install = "prek install --hook-type commit-msg --hook-type pre-push"
gen = { cmd = "python tests/data/generate_ground_truth.py" }
gen-1kg = { cmd = "python tests/data/generate_1kg_ground_truth.py", depends-on = [
    "gen",
] }
test = { cmd = "pytest tests && cargo test --release", depends-on = [
    "gen",
    "gen-1kg",
] }
test-cov = { cmd = "pytest tests --cov --cov-report=term-missing --cov-report=html --cov-report=xml", depends-on = [
    "gen",
    "gen-1kg",
] }
# Runs the suite with polars join row-order perturbed (see tests/_join_audit_plugin.py)
# so any future order-unsafe polars join fails loudly. Opt-in; normal `test` is unaffected.
test-join-audit = { cmd = "pytest tests -p tests._join_audit_plugin", depends-on = [
    "gen",
    "gen-1kg",
] }
typecheck = { cmd = "pyrefly check python/genvarloader tests" }
bench = { cmd = "pytest tests/benchmarks --codspeed -p no:cov" }
bench-local = { cmd = "pytest tests/benchmarks --benchmark-only -p no:cov" }
# perf on the Python process (NOT py-spy --native, which slows deep-stack paths ~10x).
# No sudo on Carter (perf_event_paranoid=2 allows user-space sampling of own process);
# resolves genvarloader.abi3.so Rust symbols. View with:
#   perf report --stdio --no-children -i tests/benchmarks/profiling/<mode>.perf.data
# $CONDA_PREFIX/bin/python = the active pixi env interpreter (perf must exec the right one).
profile-haps = { cmd = "perf record -F 999 -o tests/benchmarks/profiling/haps.perf.data -- $CONDA_PREFIX/bin/python tests/benchmarks/profiling/profile.py --mode haplotypes --n-batches 12000" }
profile-tracks = { cmd = "perf record -F 999 -o tests/benchmarks/profiling/tracks.perf.data -- $CONDA_PREFIX/bin/python tests/benchmarks/profiling/profile.py --mode tracks --n-batches 12000" }
profile-variants = { cmd = "perf record -F 999 -o tests/benchmarks/profiling/variants.perf.data -- $CONDA_PREFIX/bin/python tests/benchmarks/profiling/profile.py --mode variants --n-batches 12000" }
memray-haps = { cmd = "memray run -fo tests/benchmarks/profiling/haps.memray.bin tests/benchmarks/profiling/profile.py --mode haplotypes" }
memray-tracks = { cmd = "memray run -fo tests/benchmarks/profiling/tracks.memray.bin tests/benchmarks/profiling/profile.py --mode tracks" }
memray-variants = { cmd = "memray run -fo tests/benchmarks/profiling/variants.memray.bin tests/benchmarks/profiling/profile.py --mode variants" }
memray-bigwig-write = { cmd = "memray run -fo tests/benchmarks/profiling/bigwig_write.memray.bin tests/benchmarks/profiling/profile_bigwig_write.py --impl rust" }
cargo-test = { cmd = "cargo test --release" }
memray-write = { cmd = "memray run -fo tests/benchmarks/profiling/write.memray.bin tests/benchmarks/profiling/profile_write.py --op write" }

[feature.docs.tasks]
i-kernel = "ipython kernel install --user --name 'gvl-docs' --display-name 'GVL Docs'"
i-kernel-gpu = "ipython kernel install --user --name 'gvl-docs-gpu' --display-name 'GVL Docs GPU'"
doc = "cd docs && make clean && make html"

[feature.notebook.dependencies]
matplotlib = "*"
seaborn = "*"
xarray = "*"
ipykernel = "*"
ipywidgets = "*"

[feature.notebook.pypi-dependencies]
fast_histogram = "*"

[feature.notebook.tasks]
i-kernel = "ipython kernel install --user --name gvl"

[feature.splice.pypi-dependencies]
polars-bio = "*"

[feature.splice.tasks]
install-splice-branch = "uv pip install --force-reinstall --no-deps \"genvarloader @ git+https://github.com/d-laub/GenVarLoader@splice\""
i-kernel-splice = "ipython kernel install --user --name gvl-splice --display-name \"GVL Splice\""
