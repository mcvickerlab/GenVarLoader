[workspace]
name = "genvarloader"
channels = ["conda-forge", "bioconda"]
platforms = ["linux-64", "osx-arm64"]

[environments]
default = { features = ["default", "pytorch-cpu", "py310"] }
dev = { features = ["basenji2", "py310"] }
docs = { features = ["docs", "pytorch-cpu", "basenji2", "py312"] }
docs-gpu = { features = ["docs", "pytorch-gpu", "basenji2", "py312"] }
py310 = { features = ["pytorch-cpu", "py310"] }
py311 = { features = ["pytorch-cpu", "py311"] }
py312 = { features = ["pytorch-cpu", "py312"] }
py313 = { features = ["pytorch-cpu", "py313"] }
no-torch = { features = ["py310"], no-default-feature = true }
notebook = { features = ["notebook", "py310"] }
splice = { features = ["notebook", "basenji2", "py310", "splice"] }

[target.osx-arm64.activation.env]
RUSTFLAGS = "-C link-arg=-rpath -C link-arg=$CONDA_PREFIX/lib"

[dependencies]
python = "<3.14"
uv = "*"
samtools = "*"
bcftools = "*"
ruff = "*"
prek = "*"
commitizen = "*"
maturin = ">=1.13.1,<2"
typing-extensions = ">=4.14"
typer = "*"
pytest-cases = "*"
pytest-cov = "*"
pytest-benchmark = "*"
pytest-codspeed = "*"
pytest = "*"
py-spy = "*"
icecream = "*"
hypothesis = "*"
filelock = "*"
memray = "*"
patchelf = "*"
pyrefly = "*"

[target.linux-64.dependencies]
plink2 = "*"

[pypi-dependencies]
genvarloader = { path = ".", editable = true, extras = ["cli"] }
# Test-only: needed by the property/fixture tests across the whole py3xx matrix
# (not a genvarloader runtime dep, so it must live here, not just in py310).
vcfixture = ">=0.5.0"

[feature.docs.dependencies]
pandoc = "*"

[feature.docs.pypi-dependencies]
sphinx = ">=7.4.7"
myst-parser = "*"
nbsphinx = "*"
ipykernel = "*"
ipywidgets = "*"
sphinx-book-theme = "*"
sphinx-autobuild = "*"
sphinx-autodoc-typehints = "*"
matplotlib = "*"
seaborn = "*"
scipy = "*"

[feature.pytorch-cpu.target.linux-64.dependencies]
pytorch-cpu = ">=2,<3"

[feature.pytorch-cpu.target.osx-arm64.pypi-dependencies]
torch = ">=2,<3"

[feature.pytorch-gpu.target.linux-64.pypi-dependencies]
torch = { version = ">=2,<3", index = "https://download.pytorch.org/whl/cu126" }

[feature.basenji2.target.linux-64.pypi-dependencies]
basenji2-pytorch = ">=0.1.2"

[feature.py310.dependencies]
python = "3.10.*"
numpy = "1.26.*"
numba = "==0.59.1"

[feature.py310.pypi-dependencies]
pyarrow = ">=21"
hirola = "==0.3"
seqpro = "==0.15.1"
genoray = "==2.9.2"
polars = "==1.37.1"
loguru = "*"
natsort = "*"
cyvcf2 = "*"
pgenlib = "*"
pandera = "*"
pysam = "*"
pyranges = "*"
more-itertools = "*"
tqdm = "*"
pybigwig = "*"
einops = "*"
joblib = "*"
pooch = "*"
awkward = "*"
pydantic = ">=2,<3"
hypothesis = "*"
vcfixture = ">=0.5.0"
filelock = "*"

[feature.py311.dependencies]
python = "3.11.*"

[feature.py312.dependencies]
python = "3.12.*"

[feature.py313.dependencies]
python = "3.13.*"

[tasks]
prek-install = "prek install --hook-type commit-msg --hook-type pre-push"
gen = { cmd = "python tests/data/generate_ground_truth.py" }
gen-1kg = { cmd = "python tests/data/generate_1kg_ground_truth.py", depends-on = [
    "gen",
] }
test = { cmd = "pytest tests && cargo test --release", depends-on = [
    "gen",
    "gen-1kg",
] }
test-cov = { cmd = "pytest tests --cov --cov-report=term-missing --cov-report=html --cov-report=xml", depends-on = [
    "gen",
    "gen-1kg",
] }
# Runs the suite with polars join row-order perturbed (see tests/_join_audit_plugin.py)
# so any future order-unsafe polars join fails loudly. Opt-in; normal `test` is unaffected.
test-join-audit = { cmd = "pytest tests -p tests._join_audit_plugin", depends-on = [
    "gen",
    "gen-1kg",
] }
typecheck = { cmd = "pyrefly check" }
bench = { cmd = "pytest tests/benchmarks --codspeed -p no:cov" }
bench-local = { cmd = "pytest tests/benchmarks --benchmark-only -p no:cov" }
profile-haps = { cmd = "py-spy record -o tests/benchmarks/profiling/haps.speedscope.json -f speedscope -- python tests/benchmarks/profiling/profile.py --mode haplotypes" }
profile-tracks = { cmd = "py-spy record -o tests/benchmarks/profiling/tracks.speedscope.json -f speedscope -- python tests/benchmarks/profiling/profile.py --mode tracks" }
profile-variants = { cmd = "py-spy record -o tests/benchmarks/profiling/variants.speedscope.json -f speedscope -- python tests/benchmarks/profiling/profile.py --mode variants" }
memray-haps = { cmd = "memray run -fo tests/benchmarks/profiling/haps.memray.bin tests/benchmarks/profiling/profile.py --mode haplotypes" }
memray-tracks = { cmd = "memray run -fo tests/benchmarks/profiling/tracks.memray.bin tests/benchmarks/profiling/profile.py --mode tracks" }
memray-variants = { cmd = "memray run -fo tests/benchmarks/profiling/variants.memray.bin tests/benchmarks/profiling/profile.py --mode variants" }
memray-bigwig-write = { cmd = "memray run -fo tests/benchmarks/profiling/bigwig_write.memray.bin tests/benchmarks/profiling/profile_bigwig_write.py --impl rust" }

[feature.docs.tasks]
install-e = "uv pip install -e /cellar/users/dlaub/projects/ML4GLand/SeqPro -e /cellar/users/dlaub/projects/genoray -e ."
i-kernel = "ipython kernel install --user --name 'gvl-docs' --display-name 'GVL Docs'"
i-kernel-gpu = "ipython kernel install --user --name 'gvl-docs-gpu' --display-name 'GVL Docs GPU'"
doc = "cd docs && make clean && make html"

[feature.notebook.dependencies]
matplotlib = "*"
seaborn = "*"
xarray = "*"
ipykernel = "*"
ipywidgets = "*"

[feature.notebook.pypi-dependencies]
fast_histogram = "*"

[feature.notebook.tasks]
i-kernel = "ipython kernel install --user --name gvl"

[feature.splice.pypi-dependencies]
polars-bio = "*"

[feature.splice.tasks]
install-splice-branch = "uv pip install --force-reinstall --no-deps \"genvarloader @ git+https://github.com/d-laub/GenVarLoader@splice\""
i-kernel-splice = "ipython kernel install --user --name gvl-splice --display-name \"GVL Splice\""
