[package]
name = "genvarloader"
version = "0.2.1"
edition = "2021"
authors = ["David Laub <dlaub@ucsd.edu"]

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[lib]
name = "genvarloader"
crate-type = ["cdylib", "rlib"]

[dependencies]
anyhow = "1.0.102"
bigtools = "0.5.6"
coitrees = "0.4"
itertools = "0.14.0"
ndarray = "0.17.2"
numpy = "0.28.0"
rayon = "1.12.0"
seqpro-core = { path = "../seqpro/crates/seqpro-core" }

[features]
extension-module = ["pyo3/extension-module"]

[dependencies.pyo3]
version = "0.28.3"
features = ["abi3-py310"]

[dev-dependencies]
rstest = "0.26.1"
