[package]
name = "genvarloader"
version = "0.2.1"
edition = "2021"
authors = ["David Laub <dlaub@ucsd.edu"]

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[lib]
name = "genvarloader"
crate-type = ["cdylib", "rlib"]

[dependencies]
anyhow = "1.0.102"
bigtools = "0.5.6"
coitrees = "0.4"
itertools = "0.14.0"
ndarray = "0.17.2"
numpy = "0.29.0"
rayon = "1.12.0"
seqpro-core = "0.1"
svar2-codec = { path = "/carter/users/dlaub/projects/genoray/svar2-codec" }
genoray_core = { path = "/carter/users/dlaub/projects/genoray", package = "genoray", default-features = false }

[features]
extension-module = ["pyo3/extension-module"]

[dependencies.pyo3]
version = "0.29"
features = ["abi3-py310"]

[dev-dependencies]
rstest = "0.26.1"

# Perf call-graph attribution only (`perf report --children`). Inherits release
# codegen and adds line tables + frame pointers. NEVER the gate artifact — all
# throughput/asm gate numbers come from the plain `--release` build.
[profile.profiling]
inherits = "release"
debug = "line-tables-only"
force-frame-pointers = true
